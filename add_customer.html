<!DOCTYPE html>
<html>
<head>
  <title>Add Customer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
    <a href="index.html">Home</a>
    <a href="customer_list.html">Customer List</a>
    <a href="add_customer.html">Add Customer</a>
    <a href="sales_overview.html">Sales Overview</a>
</nav>

<h2>Add Customer</h2>

<form id="customerForm">

  <label for="name">Customer Name</label>
  <input type="text" id="name" name="name" required placeholder="Enter Customer Name">

  <label for="email">Email</label>
  <input type="email" id="email" name="email" required placeholder="Enter Email">

  <label for="phone">Phone Number</label>
  <input type="tel" id="phone" name="phone" pattern="\d{10}" placeholder="Enter 10-digit number">

  <label for="sales_stage">Sales Stage</label>
  <select id="sales_stage" name="sales_stage" required>
    <option value="">Select Stage</option>
    <option value="New">New</option>
    <option value="In Progress">In Progress</option>
    <option value="Closed">Closed</option>
  </select>

  <button type="submit">Submit</button>

</form>
<script src="script.js"></script>
</body>
</html>
